# Gito project configuration for RalphHarness

# Exclude patterns — files that should NOT be reviewed
exclude_files = [
    # Hidden files and directories (dotfiles)
    ".*",
    ".*/**",

    # Files/directories starting with underscore
    "_*",
    "_*/**",

    # Specs directory (planning artifacts, not production code)
    "specs/**",

    # Plans directory
    "plans/**",

    # Research directory
    "research/**",

    # BMAD output
    "_bmad-output/**",

    # Temporary directories
    "tmp.*/**",

    # Lock files
    "*.lock",

    # Generated files
    "**/.gitkeep",
]

# Context files to provide alongside reviews
aux_files = [
    "AGENTS.md",
    "CLAUDE.md",
    "README.md",
    "docs/ARCHITECTURE.md",
    "docs/ENGINE_ROADMAP.md",
    ".gito/context.md",
]

# PR comment triggers
mention_triggers = ["gito", "/review", "/check"]
collapse_previous_code_review_comments = true

# Custom review instructions — provides project-specific context
[prompt_vars]
# Requirements that apply to ALL code reviews in this project
requirements = """
- This is the Smart Ralph project: a Claude Code plugin for spec-driven development
- Smart Ralph transforms feature requests into structured specs (research, requirements, design, tasks) then executes them task-by-task
- Key principles: SPEC FIRST, POC BEFORE TESTS, VERIFY EVERY TASK, NO MERGE WITHOUT REVIEW
- Follow existing patterns in the codebase — do not refactor adjacent code
- All plugin files are markdown-based (commands, agents, hooks, skills)
- For plugins: use plugin.json manifest, follow Claude Code plugin conventions
- For specs: use specs/<name>/tasks.md with done-when + verify commands
- Never commit directly to main — always PR

[RENAMING FEATURE CONTEXT — feature/renaming → main]
Branch: feature/renaming (67 commits)
Goal: Rename ralph-specum → RalphHarness, Smart Ralph → RalphHarness everywhere
INTENTIONAL PATTERNS (NOT BUGS — DO NOT FLAG):
- All references of "ralph-specum" → "ralphharness"
- All references of "Smart Ralph" → "RalphHarness"
- All references of "ralph-harness" → "ralphharness"
- Plugin path: plugins/ralph-specum/ → plugins/ralphharness/
- Slash commands: /ralph-specum:* → /ralphharness:*
- All agent names, scripts, docs, templates updated
- Version bumps in .claude-plugin/plugin.json and .claude-plugin/marketplace.json
- CHANGELOG updates from ralph-specum → RalphHarness
KNOWN TRUE ISSUES (ALREADY FIXED, DO NOT FLAG AGAIN):
#1 plugins/ralphharness/commands/cancel.md L77: Added SPEC_NAME variable
#2 plugins/ralphharness/hooks/scripts/path-resolver.sh L136: tr → sed for space preservation
#3 plugins/ralphharness/references/loop-safety.md L35: gmtime | strftime
#4 plugins/ralphharness/references/phase-rules.md: Removed duplicate EOF sections
#5 plugins/ralphharness/skills/e2e/examples/homeassistant-selector-map.skill.md L50: :scope >> → text=
#6 plugins/ralphharness-codex/scripts/merge_state.py: FileExistsError try/except
REVIEW FOCUS: Flag ONLY NEW issues unrelated to the rename. Do not flag any naming, version, or path changes from the rename. Do not flag build output or generated files.

[PAIR-DEBUG AUTO-TRIGGER CONTEXT — spec/collaboration-resolution-real → main]
Branch: spec/collaboration-resolution-real (13 commits)
Goal: Add automatic pair-debug mode trigger with 3-condition check and Driver/Navigator role split
INTENTIONAL PATTERNS (NOT BUGS — DO NOT FLAG):
- All edits to existing files are APPEND-ONLY (new sections/branches), except one value change in collaboration-resolution.md:53 (>3 → >10)
- No new subagent_type: role files are prompt markdown only, NOT registered agents
- No new .ralph-state.json fields: all state in chat.md and signals.jsonl
- Filesystem-only coordination between Driver/Navigator: flock fd 200 for chat.md, fd 202 for signals.jsonl
- Role files self-contained: no CLAUDE_PLUGIN_ROOT references, inlined flock blocks
- Anti-anchoring rule: Navigator MUST propose >=2 independent hypotheses BEFORE first EXPERIMENT
- Loop bound >10 cycles (raised from >3 per user override) — intentional
- PAIR-DEBUG: marker for temporary debug logs — cleanup verifiable via single grep
- Two-instance exportable role files: pair-debug-driver.md + pair-debug-navigator.md with Section 0 Bootstrap
- Placement step in implement.md: onboarding asks where to run pair-debug roles (3 branches)
REVIEW FOCUS: Flag ONLY genuine issues in production/plugin files and tests. Do not flag intentional patterns listed above. Exclude specs/ directory (planning artifacts).
"""

# Summary-specific requirements
summary_requirements = """
- Evaluate if the code aligns with Smart Ralph's spec-driven workflow
- Check for consistency with existing patterns (markdown commands, agent system prompts, hooks)
- Verify architectural decisions match the epic goals
"""

# Additional context injected into the system prompt
awards = ""
